#  application.properties Quarkus Radar SPVias
#
#  Perfis disponÌveis:
#    %dev    quarkus:dev (hot reload, swagger UI, H2 in-memory n„o se aplica usa Mongo real)
#    %test   mvn test
#    %prod build/container (padr„o)
#
#  Para ativar um perfil na linha de comando:
#    ./mvnw quarkus:dev                       perfil dev (padr„o)
#    ./mvnw quarkus:dev -Dquarkus.profile=prod
#    java -Dquarkus.profile=prod -jar app.jar
# #############################################

## #############################################
#  APLICA«√O
## #############################################
quarkus.application.name=microservico-radares-spvias
quarkus.application.version=1.0.0

# # #############################################
#  HTTP
## #############################################
quarkus.http.port=8084
%dev.quarkus.http.port=8084
%test.quarkus.http.port=8095

# # #############################################
#  CORS
# # #############################################
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:3000,http://172.27.175.82:3009
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=*
quarkus.http.cors.access-control-allow-credentials=true

%prod.quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

## #############################################
#  MONGODB
# # #############################################
# Prod aponta para o servidor real
quarkus.mongodb.connection-string=${CONNECTION_URI_MONGODB}
quarkus.mongodb.database=${DATABASE_MONGODB}

# Vari·veis de ambiente sobrescrevem os valores acima em produÁ„o
%prod.quarkus.mongodb.connection-string=${MONGODB_URI}
%prod.quarkus.mongodb.database=${MONGODB_DATABASE}

# Dev mesmo servidor (ajuste se quiser um Mongo local)
%dev.quarkus.mongodb.connection-string=${CONNECTION_URI_MONGODB}
%dev.quarkus.mongodb.database=${DATABASE_MONGODB}

# Test usa Mongo embutido (testcontainers via quarkus-test-mongodb)
%test.quarkus.mongodb.connection-string=<will-be-injected-by-devservices>

## #############################################
#  MONGODB PANACHE
# # #############################################
# Nome do banco usado pelo Panache (deve ser igual ao database acima)
quarkus.mongodb.devservices.enabled=false
%test.quarkus.mongodb.devservices.enabled=true

# # #############################################
#  RABBITMQ
# # #############################################
# Conex„o
rabbitmq-host=${RABBITMQ_HOST:localhost}
rabbitmq-port=${RABBITMQ_PORT:5672}
rabbitmq-username=${RABBITMQ_USERNAME:guest}
rabbitmq-password=${RABBITMQ_PASSWORD:guest}

%prod.rabbitmq-host=${RABBITMQ_HOST:rabbitmq}

# Canal de saÌda (publisher)
# "radares-out" corresponde ao @Channel("radares-out") no RadarMqPublisher
mp.messaging.outgoing.radares-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.radares-out.exchange.name=radares_exchange
mp.messaging.outgoing.radares-out.routing-key=radares.rondon
mp.messaging.outgoing.radares-out.exchange.type=direct
mp.messaging.outgoing.radares-out.exchange.durable=true

# Em testes e dev, desabilita RabbitMQ para n„o precisar do broker rodando
%test.mp.messaging.outgoing.radares-out.connector=smallrye-in-memory
%dev.quarkus.rabbitmq.devservices.enabled=true
%dev.quarkus.rabbitmq.devservices.port=5672

# # #############################################
#  OPENAPI / SWAGGER UI
# # #############################################
quarkus.smallrye-openapi.info-title=API Radares SPVias
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=MicrosserviÁo de leituras de radares ? Concession·ria SPVias

# Swagger UI disponÌvel apenas em dev
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

## #############################################
#  HEALTH CHECK
# # #############################################
quarkus.smallrye-health.root-path=/actuator/health

# # #############################################
#  M…TRICAS (Prometheus)
# # #############################################
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/actuator/prometheus

# # #############################################
#  LOGGING
# # #############################################
quarkus.log.level=INFO
quarkus.log.category."com.inteligencia".level=DEBUG
%prod.quarkus.log.level=INFO
%dev.quarkus.log.level=INFO

# # #############################################
#  BANNER
# # #############################################
quarkus.banner.enabled=true

## #############################################
#  EUREKA (CUSTOM CLIENT)
## #############################################
# --- ConfiguraÁıes ProduÁ„o (Docker Compose) ---
quarkus.rest-client.eureka-api.url=http://eureka-server:8761/eureka
eureka.instance.hostname=quarkus-radares-rondon

# --- ConfiguraÁıes Desenvolvimento (Local) ---
%dev.quarkus.rest-client.eureka-api.url=http://localhost:8761/eureka
%dev.eureka.instance.hostname=localhost

quarkus.http.access-log.enabled=true